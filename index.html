<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Mihai — Portofoliu</title>
  <style>
    /* Stilizare simplă ca să separăm clar secțiunile */
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 24px; }
    .profil, .portofoliu, .experienta { margin-bottom: 36px; padding: 16px; border-radius: 10px; background: #f4f4f4; }
    .profil img { width: 120px; border-radius: 50%; }
    h2 { border-bottom: 1px solid #ccc; padding-bottom: 8px; }
  </style>
</head>
<body>
  <!-- Secțiunea 1: Profil -->
  <section class="profil">
    <img src="profil.jpg" alt="Poza profil Mihai" />
    <h2>Mihai Oliu</h2>
    <p><strong>Rol:</strong> Front-end Developer / JavaScript Enthusiast</p>
    <p><strong>Tehnologii preferate:</strong> HTML, CSS, JavaScript, React</p>
    <p>Sunt pasionat de dezvoltarea web și creez interfețe simple și funcționale.</p>
  </section>

  <!-- Secțiunea 2: Portofoliu -->
  <section class="portofoliu">
    <h2>Portofoliu</h2>
    <div id="repo-list">
      <!-- Aici vor apărea repo-urile preluate dinamic de pe GitHub -->
    </div>
  </section>

  <!-- Secțiunea 3: Experiență de muncă -->
  <section class="experienta">
    <h2>Experiență de muncă</h2>
    <ul>
      <!-- Exemplu de job (poți șterge dacă nu ai experiență sau adaugi altceva) -->
      <li>
        <strong>Front-end Developer</strong> — IT SRL<br>
        <small>Mai 2023 - prezent</small>
      </li>
      <!-- Adaugă mai multe aici dacă e cazul -->
    </ul>
  </section>
  <script src="main.js"></script>
</body>
</html>
